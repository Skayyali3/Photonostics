{% extends "base.html" %}
{% block title %}Reset Password{% endblock %}
 
{% block content %}
<h2 class="page-header">Reset Password</h2>
 
<div class="form-container">
  {% if invalid %}
  <div class="alert alert-danger w-100" style="max-width:400px;">
    This reset link is invalid or has expired. Please <a href="/forgot-password" class="text-custom-link fw-bold">request a new one</a>.
  </div>
  {% else %}
  <form action="/reset-password/{{ token }}" method="post" id="reset-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <input name="password" type="password" class="form-control" placeholder="New password" autocomplete="new-password" required>
    <input name="confirm_password" type="password" class="form-control" placeholder="Confirm new password" autocomplete="new-password" required>
    <button class="btn btn-success mt-2" id="reset-button">
      <span class="button-text">Reset Password</span>
    </button>
  </form>
  {% if error %}
  <div class="alert alert-danger w-100 mt-2" style="max-width:400px;">{{ error }}</div>
  {% endif %}
  {% endif %}
</div>
{% endblock %}
