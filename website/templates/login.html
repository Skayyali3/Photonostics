{% extends "base.html" %}
{% block title %}Log in{% endblock %}
 
{% block content %}
<h2 class="page-header">Log in</h2>
 
<div class="form-container">
  <form action="/login" method="post" id="login-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <input name="username" class="form-control" placeholder="Username or Email" autocomplete="username email">
    <input name="password" type="password" class="form-control" placeholder="Password" autocomplete="current-password">
    <button class="btn btn-success mt-2" id="login-button">
      <span class="button-text">Log in</span>
    </button>
  </form>
  {% if error %}
  <div class="alert alert-danger w-100" style="max-width:400px;">{{ error }}</div>
  {% endif %}
  <p class="mt-3 text-white">Don't have an account? <a href="/signup" class="text-custom-link fw-bold">Sign up</a></p>
  <p class="mt-1 text-white"><a href="/forgot-password" class="text-custom-link fw-bold">Forgot your password?</a></p>
</div>
{% endblock %}
